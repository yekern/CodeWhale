name: Nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -Dwarnings
  DEEPSEEK_BUILD_SHA: ${{ github.sha }}

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            cli_binary: codewhale
            tui_binary: codewhale-tui
            cli_artifact: codewhale-linux-x64
            tui_artifact: codewhale-tui-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            cli_binary: codewhale
            tui_binary: codewhale-tui
            cli_artifact: codewhale-linux-arm64
            tui_artifact: codewhale-tui-linux-arm64
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            platform: linux-riscv64
            cli_binary: codewhale
            tui_binary: codewhale-tui
            cli_artifact: codewhale-linux-riscv64
            tui_artifact: codewhale-tui-linux-riscv64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x64
            cli_binary: codewhale
            tui_binary: codewhale-tui
            cli_artifact: codewhale-macos-x64
            tui_artifact: codewhale-tui-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            cli_binary: codewhale
            tui_binary: codewhale-tui
            cli_artifact: codewhale-macos-arm64
            tui_artifact: codewhale-tui-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            cli_binary: codewhale.exe
            tui_binary: codewhale-tui.exe
            cli_artifact: codewhale-windows-x64.exe
            tui_artifact: codewhale-tui-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.88'
          targets: ${{ matrix.target }}
      - name: Install Rust target
        run: rustup target add --toolchain 1.88 ${{ matrix.target }}
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "${GITHUB_ENV}"
          echo "RUSTC_WRAPPER=sccache" >> "${GITHUB_ENV}"
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          for i in 1 2 3 4 5; do
            sudo apt-get update && break
            echo "apt-get update failed (attempt $i); retrying in 15s"
            sleep 15
          done
          sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Install RISC-V cross-compilation toolchain
        if: matrix.target == 'riscv64gc-unknown-linux-gnu'
        run: |
          # Install cross-compiler (available in standard repos)
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu libc6-dev-riscv64-cross

          # Add Ubuntu ports for riscv64 packages
          . /etc/os-release
          sudo tee /etc/apt/sources.list.d/riscv64.sources <<SRC
          Types: deb
          URIs: http://ports.ubuntu.com/
          Suites: ${UBUNTU_CODENAME} ${UBUNTU_CODENAME}-updates
          Components: main universe
          Architectures: riscv64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SRC
          sudo dpkg --add-architecture riscv64
          sudo apt-get update -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/riscv64.sources -o Dir::Etc::sourceparts=- -o APT::Get::List-Cleanup=0
          sudo apt-get install -y libdbus-1-dev:riscv64
      - name: Build
        shell: bash
        env:
          CC_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-gcc
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_LIBDIR_riscv64gc_unknown_linux_gnu: /usr/lib/riscv64-linux-gnu/pkgconfig
        run: |
          for attempt in 1 2 3; do
            if cargo build --release --locked --target ${{ matrix.target }} -p codewhale-cli -p codewhale-tui; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Build attempt ${attempt} failed; retrying in 30s..."
              sleep 30
            fi
          done
          echo "Build failed after 3 attempts" >&2
          exit 1
      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          stage_one() {
            local binary="$1"
            local artifact="$2"
            local dir="$3"
            local bin_path="target/${{ matrix.target }}/release/${binary}"
            if [ ! -f "${bin_path}" ]; then
              echo "Binary not at ${bin_path}; searching target/ for ${binary}:"
              find target -name "${binary}" -type f
              exit 1
            fi

            mkdir -p "${dir}"
            cp "${bin_path}" "${dir}/${artifact}"
            cat > "${dir}/nightly-build-info.txt" <<INFO
          repository=${GITHUB_REPOSITORY}
          ref=${GITHUB_REF_NAME}
          commit=${GITHUB_SHA}
          artifact=${artifact}
          INFO
          }

          stage_one "${{ matrix.cli_binary }}" "${{ matrix.cli_artifact }}" nightly-cli
          stage_one "${{ matrix.tui_binary }}" "${{ matrix.tui_artifact }}" nightly-tui
          echo "cli_name=${{ matrix.cli_artifact }}-${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "tui_name=${{ matrix.tui_artifact }}-${short_sha}" >> "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.stage.outputs.cli_name }}
          path: nightly-cli/*
          retention-days: 14
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.stage.outputs.tui_name }}
          path: nightly-tui/*
          retention-days: 14
